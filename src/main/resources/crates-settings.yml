roulette:
  # Time in ticks between each roulette move.
  # Recommended: 2-5.
  # [DANGER] Values below 1 can create lag and visual glitches.
  tick-speed: 2

  # Total amount of spin steps before stopping.
  # Recommended: 40-80.
  # [DANGER] Very high values make animations too long for players.
  total-steps: 50
