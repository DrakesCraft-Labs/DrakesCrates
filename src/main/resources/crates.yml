# DrakesCrates main config.
# This file defines keys, crates, locations, and rewards.
# [DANGER] If you change IDs (key/crate/reward), update commands and integrations.
# [DANGER] Reward chances <= 0 effectively disable the reward.

keys:
  basic_key:
    # Visible key name (MiniMessage).
    display-name: "<gold><b>Basic Key</b></gold>"
    item:
      # Material for the physical key item.
      material: TRIPWIRE_HOOK
      amount: 1
      name: "<yellow>Basic Key"
      lore:
        - "<gray>Use this key to open"
        - "<gray>the Basic Crate."
      enchantments:
        unbreaking: 1
      # Optional model for resource packs.
      custom-model-data: 1001

crates:
  basic:
    # Crate display name used in UIs and messages.
    display-name: "<gradient:gold:yellow><b>Basic Crate</b></gradient>"

    # Crate access mode: PHYSICAL_KEY, VIRTUAL_KEY, FREE.
    type: PHYSICAL_KEY

    # Required key id when type = PHYSICAL_KEY.
    key-id: basic_key

    # Item used in selector/editor and crate references.
    preview-item:
      material: CHEST
      amount: 1
      name: "<gold>Basic Crate"
      lore:
        - "<gray>Contains common rewards."

    locations:
      # Format: world,x,y,z[,yaw,pitch]
      # [DANGER] Invalid world name = crate unusable at runtime.
      - "world,0,64,0"

    rewards:
      coins:
        display-name: "<yellow>Coins Reward"
        # Win chance in percentage-like weight.
        # [DANGER] Keep total distribution balanced for economy health.
        chance: 60.0
        commands:
          - "eco give %player% 250"
        display-item:
          material: GOLD_NUGGET
          amount: 8
          name: "<yellow>250 Coins"
          lore:
            - "<gray>Common economy reward."

      diamond_pack:
        display-name: "<aqua>Diamond Pack"
        chance: 35.0
        commands:
          - "give %player% diamond 5"
        display-item:
          material: DIAMOND
          amount: 5
          name: "<aqua>Diamond Pack"
          lore:
            - "<gray>Useful crafting reward."

      legendary_pickaxe:
        display-name: "<rainbow>Legendary Pickaxe"
        chance: 5.0
        commands:
          - "give %player% netherite_pickaxe 1"
        display-item:
          material: NETHERITE_PICKAXE
          amount: 1
          name: "<rainbow>Legendary Pickaxe"
          lore:
            - "<gray>Rare jackpot reward."
          enchantments:
            EFFICIENCY: 5
            UNBREAKING: 3
